name: Java brXM CI

on:
  workflow_call:
    inputs:
      run-demo-build:
        description: "Whether to run the demo module build"
        type: boolean
        default: false
      demo-pom-path:
        description: "Path to the demo module pom.xml"
        type: string
        default: "demo/pom.xml"
    secrets:
      BR_MAVEN_USERNAME:
        required: true
      BR_MAVEN_PASSWORD:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Configure Maven settings
        uses: bloomreach-forge/ci-workflows/.github/actions/configure-maven-settings@v1.0.4
        with:
          username: ${{ secrets.BR_MAVEN_USERNAME }}
          password: ${{ secrets.BR_MAVEN_PASSWORD }}

      - name: Verify versions are aligned
        env:
          DEMO_POM_PATH: ${{ inputs.demo-pom-path }}
        run: |
          if [ ! -f "$DEMO_POM_PATH" ]; then
            echo "No demo pom found at '$DEMO_POM_PATH' — skipping version check"
            exit 0
          fi
          ROOT_VERSION=$(awk -F'[<>]' '/<parent>/,/<\/parent>/{next} /<version>/{print $3; exit}' pom.xml)
          DEMO_VERSION=$(awk -F'[<>]' '/<parent>/,/<\/parent>/{next} /<version>/{print $3; exit}' "$DEMO_POM_PATH")
          echo "Root: $ROOT_VERSION, Demo: $DEMO_VERSION"
          if [ "$ROOT_VERSION" != "$DEMO_VERSION" ]; then
            echo "ERROR: Root version '$ROOT_VERSION' does not match demo version '$DEMO_VERSION'"
            exit 1
          fi

      - name: Build and test
        env:
          RUN_DEMO_BUILD: ${{ inputs.run-demo-build }}
          BR_MAVEN_USERNAME: ${{ secrets.BR_MAVEN_USERNAME }}
          BR_MAVEN_PASSWORD: ${{ secrets.BR_MAVEN_PASSWORD }}
        run: |
          if [ "$RUN_DEMO_BUILD" = "true" ]; then
            mvn -B clean install
          else
            mvn -B clean verify
          fi
      

      - name: Build and test demo
        if: ${{ inputs.run-demo-build }}
        env:
          DEMO_POM_PATH: ${{ inputs.demo-pom-path }}
          BR_MAVEN_USERNAME: ${{ secrets.BR_MAVEN_USERNAME }}
          BR_MAVEN_PASSWORD: ${{ secrets.BR_MAVEN_PASSWORD }}
        run: mvn -B -f "$DEMO_POM_PATH" clean verify


      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@db71d41eb79864e25ab0337e395c352e84523afe # v4
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'

      - name: Publish coverage report
        if: always()
        uses: Madrapps/jacoco-report@50d3aff4548aa991e6753342d9ba291084e63848 # v1.7.2
        with:
          paths: '**/target/site/jacoco/jacoco.xml'
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 0