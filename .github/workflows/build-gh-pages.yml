name: Maven site to GitHub Pages

on:
  workflow_call:
    inputs:
      ref:
        description: "Commit SHA or ref to build docs from"
        required: true
        type: string
      java-version:
        description: "Java version to use"
        required: false
        type: string
        default: "17"
      docs-dir:
        description: "Directory containing generated site docs"
        required: false
        type: string
        default: "docs"
      site-profile:
        description: "Maven profile used to build the site"
        required: false
        type: string
        default: "github.pages"
    secrets:
      BR_MAVEN_USERNAME:
        required: true
      BR_MAVEN_PASSWORD:
        required: true

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: "temurin"

      - name: Configure Maven settings
        uses: bloomreach-forge/ci-workflows/.github/actions/configure-maven-settings@v1.0.4
        with:
          username: ${{ secrets.BR_MAVEN_USERNAME }}
          password: ${{ secrets.BR_MAVEN_PASSWORD }}

      - name: Build site
        env:
          SITE_PROFILE: ${{ inputs.site-profile }}
          BR_MAVEN_USERNAME: ${{ secrets.BR_MAVEN_USERNAME }}
          BR_MAVEN_PASSWORD: ${{ secrets.BR_MAVEN_PASSWORD }}
        run: mvn -B site -P"$SITE_PROFILE"


      - name: Deploy site to gh-pages
        env:
          DOCS_DIR: ${{ inputs.docs-dir }}
          REF: ${{ inputs.ref }}
        run: |
          if [ ! -d "$DOCS_DIR" ]; then
            echo "ERROR: Site build did not produce $DOCS_DIR/ directory"
            exit 1
          fi

          mkdir -p /tmp/site-docs/
          cp -r "$DOCS_DIR/" /tmp/site-docs/

          # Remove build artifacts so they are not picked up by git add -A
          git clean -fdx

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to gh-pages (create if needed)
          if git fetch origin gh-pages:gh-pages 2>/dev/null; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
          fi

          # Replace site content
          git rm -rf . 2>/dev/null || true
          cp -r /tmp/site-docs/* .
          git add -A
          git diff --staged --quiet || git commit -m "regenerate docs for $REF"
          git push origin gh-pages
